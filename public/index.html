<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@skax/logger — Demo</title>
    <link rel="stylesheet" href="./demo.css" />
  </head>
  <body>
    <header>
      <h1><span>@skax/logger</span></h1>
      <p>Lightweight logger — level filtering · module prefix · caller-context output</p>
    </header>

    <div class="container">
      <!-- Level Control -->
      <div class="card">
        <div class="card-title">Log Level <span class="badge" id="currentLevelBadge">WARN</span></div>
        <div class="level-grid" id="levelGrid">
          <button class="level-btn" data-level="0">NONE</button>
          <button class="level-btn" data-level="1">ERROR</button>
          <button class="level-btn active" data-level="2">WARN</button>
          <button class="level-btn" data-level="3">INFO</button>
          <button class="level-btn" data-level="4">DEBUG</button>
        </div>
        <div class="hint" id="levelDesc">
          Current = <strong>WARN</strong> —
          <span style="color: #ff4d6a">error</span>
          + <span style="color: #ffb347">warn</span> are shown.
        </div>
      </div>

      <!-- Prefix + Singleton -->
      <div class="card">
        <div class="card-title">Module Prefix</div>
        <div class="input-row">
          <label for="prefixInput">[</label>
          <input id="prefixInput" type="text" value="Demo" maxlength="20" />
          <label for="prefixInput">]</label>
          <span style="font-size: 0.73rem; color: #555">— live update · try typing!</span>
        </div>
      </div>

      <!-- Trigger Logs -->
      <div class="card">
        <div class="card-title">Trigger Logs</div>
        <div class="actions">
          <button class="btn" id="btnError" style="border-color: #ff4d6a44; color: #ff4d6a">.error()</button>
          <button class="btn" id="btnWarn" style="border-color: #ffb34744; color: #ffb347">.warn()</button>
          <button class="btn" id="btnInfo" style="border-color: #4da6ff44; color: #4da6ff">.info()</button>
          <button class="btn" id="btnDebug" style="border-color: #5cdb5c44; color: #5cdb5c">.debug()</button>
          <button class="btn" id="btnGroup">.group() / .groupEnd()</button>
          <button class="btn" id="btnAll">Fire All 4</button>
        </div>
      </div>
    </div>

    <footer>
      @skax/logger — MIT —
      <a href="https://github.com/freeshineit/logger" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script src="./index.umd.js"></script>

    <script src="./demo.js"></script>
  </body>
</html>
